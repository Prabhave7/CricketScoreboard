<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scoreboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>ScoreBoard</h1>
  <button class="reset">Reset</button>
  <button class="inning">Change</button>
  <div class="team1">
    <h3>Team-1</h3>
    <div class="run">00</div>
    <div class="dash">-</div>
    <div class="wicket">0</div>
    <div class="over">0</div>
    <!-- <div class="ball">.</div> -->
    <!-- <div class="ball">0</div> -->
  </div>
  <div class="team2">
    <h3>Team-2</h3>
    <div class="run">00</div>
    <div class="dash">-</div>
    <div class="wicket">0</div>
    <div class="over">0</div>
    <!-- <div class="ball">0</div> -->
  </div>
  <div>
    <button class="b">0</button>
    <button class="b">1</button>
    <button class="b">2</button>
    <button class="b">3</button>
    <button class="b">4</button>
    <button class="b">6</button>
  </div>
  <button class="w">W</button>
<div class="description"></div>
<p>Note:Click on change for 2nd inning. </p>
</body>
<script src="script.js"></script>
</html>
